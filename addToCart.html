<!-- ===================== PAGE SCRIPT ======================= -->
    <script src="script.js"></script>
    <script>
        // ===== CART DATA (replace with your actual cart storage logic) =====
        // Sample cart item structure:
        // { id, name, category, size, orderType, price, qty, image }

        function getCart() {
            return JSON.parse(localStorage.getItem('yasCart') || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem('yasCart', JSON.stringify(cart));
        }

        function parseAddonEntries(addonsValue) {
            const addonsText = String(addonsValue || '').trim();
            if (!addonsText || addonsText.toLowerCase() === 'none') return [];

            return addonsText
                .split(',')
                .map(addon => addon.trim())
                .filter(Boolean)
                .map(addon => {
                    const pricedAddon = addon.match(/^(.*?)(?:\s*\((?:₱|php|p)?\s*([\d.]+)\))?$/i);
                    const addonName = (pricedAddon?.[1] || addon).trim();
                    const addonPrice = Number(pricedAddon?.[2] || 0);
                    return { name: addonName, price: addonPrice };
                });
        }

        function renderCart() {
            const cart = getCart();
            const tbody = document.getElementById('cartBody');
            const emptyCart = document.getElementById('emptyCart');
            const cartBottom = document.getElementById('cartBottom');
            const cartTable = document.getElementById('cartTable');

            tbody.innerHTML = '';

            if (cart.length === 0) {
                cartTable.style.display = 'none';
                emptyCart.style.display = 'block';
                cartBottom.style.display = 'none';
                return;
            }

            cartTable.style.display = 'table';
            emptyCart.style.display = 'none';
            cartBottom.style.display = 'flex';

            let subtotal = 0;
            let totalDeliveryFee = 0;

            cart.forEach((item, index) => {
                const addonsTotal = parseAddonEntries(item.addons).reduce(
                    (sum, addon) => sum + Number(addon.price || 0),
                    0
                );
                const basePrice = Number(item.price || 0);
                const qty = Math.max(1, Number(item.qty || 1));
                const itemTotal = (basePrice + addonsTotal) * qty;
                subtotal += itemTotal;
                const category = String(item.category || '').trim().toLowerCase();
                const itemFlavor = item.flavor || 'N/A';
                const itemPieces = item.piecesPerBox || 'N/A';
                const itemServing = item.serving || 'N/A';
                const itemSize = item.size || 'N/A';
                const itemLocation = item.location || 'N/A';
                const itemSugar = item.sugarLevel || 'N/A';
                const itemAddons = item.addons || 'None';

                let detailLines = [];
                if (category === 'takoyaki') {
                    detailLines = [
                        `Flavor: ${itemFlavor}`,
                        `Pieces Per Box: ${itemPieces}`,
                        `Location: ${itemLocation}`,
                        `Add-ons: ${itemAddons}`
                    ];
                } else if (category === 'shawarma') {
                    detailLines = [
                        `Flavor: ${itemFlavor}`,
                        `Location: ${itemLocation}`,
                        `Add-ons: ${itemAddons}`
                    ];
                } else if (category === 'chicken wings + fries') {
                    detailLines = [
                        `Serving: ${itemServing}`,
                        `Location: ${itemLocation}`,
                        `Add-ons: ${itemAddons}`
                    ];
                } else if (category === 'burger') {
                    detailLines = [
                        `Burger: ${item.name || 'N/A'}`,
                        `Location: ${itemLocation}`,
                        `Add-ons: ${itemAddons}`
                    ];
                } else if (category === 'fries') {
                    detailLines = [
                        `Size: ${itemSize}`,
                        `Location: ${itemLocation}`,
                        `Add-ons: ${itemAddons}`
                    ];
                } else {
                    // Drinks
                    detailLines = [
                        `Size: ${itemSize}`,
                        `Location: ${itemLocation}`,
                        `Sugar Level: ${itemSugar}`,
                        `Add-ons: ${itemAddons}`
                    ];
                }
                
                // Add delivery fee if this item has one
                if (item.deliveryFee) {
                    totalDeliveryFee += item.deliveryFee;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-item">
                        <img src="${item.image || 'images/yas_logo.png'}" alt="${item.name}" class="cart-item-img">
                    </td>
                    <td class="col-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-category">${item.category || ''}</div>
                        <div class="cart-item-sub">
                            ${detailLines.join('<br>')}
                        </div>
                    </td>
                    <td class="col-price">&#8369;${basePrice}</td>
                    <td class="col-qty">
                        <div class="qty-control">
                            <button class="qty-btn" onclick="changeQty(${index}, -1)">&#8722;</button>
                            <input class="qty-value" type="number" value="${qty}" min="1" onchange="setQty(${index}, this.value)">
                            <button class="qty-btn" onclick="changeQty(${index}, 1)">&#43;</button>
                        </div>
                    </td>
                    <td class="col-total">&#8369;${itemTotal}</td>
                    <td class="col-action">
                        <button class="delete-btn" onclick="removeItem(${index})" aria-label="Remove item">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const grandTotal = subtotal + totalDeliveryFee;

            document.getElementById('subtotalVal').textContent = '₱' + subtotal;
            document.getElementById('deliveryVal').textContent = '₱' + totalDeliveryFee;
            document.getElementById('totalVal').textContent = '₱' + grandTotal;
        }

        function changeQty(index, delta) {
            const cart = getCart();
            cart[index].qty = Math.max(1, cart[index].qty + delta);
            saveCart(cart);
            renderCart();
        }

        function setQty(index, value) {
            const cart = getCart();
            cart[index].qty = Math.max(1, parseInt(value) || 1);
            saveCart(cart);
            renderCart();
        }

        function removeItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart();
        }

        function proceedToCheckout() {
            const cart = getCart();
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            // Cart data is already in localStorage, confirmOrder.html will read it
            window.location.href = 'confirmOrder.html';
        }

        // Initial render
        renderCart();
    </script>
