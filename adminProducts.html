<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Products | Yas Milktea House</title>
  <link rel="icon" type="image/png" href="images/footer_logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="..." crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body class="admin-dashboard-page">
  <!-- ====================== ADMIN SHELL ====================== -->
  <main class="ADMIN-PAGE">
    <section class="ADMIN-APP">
      <!-- ===================== SIDEBAR ===================== -->
      <aside class="ADMIN-SIDEBAR">
        <div class="ADMIN-BRAND">
          <div class="ADMIN-BRAND-LOGO">
            <img src="images/yas_logo.png" alt="YAS Milktea House logo">
          </div>
          <div class="ADMIN-BRAND-TEXT">
            <h1>YAS Milktea House</h1>
            <p>ADMIN</p>
          </div>
        </div>


        <!-- ===================== NAVIGATION ===================== -->
        <nav class="ADMIN-NAV">
          <a href="adminDashboard.html" class="ADMIN-NAV-LINK">
            <i class="fa-solid fa-table-cells-large"></i>
            <span>Dashboard</span>
          </a>
          <a href="adminProducts.html" class="ADMIN-NAV-LINK active">
            <i class="fa-solid fa-box-archive"></i>
            <span>Products</span>
          </a>
          <a href="adminOrders.html" class="ADMIN-NAV-LINK">
            <i class="fa-solid fa-clipboard-check"></i>
            <span>Orders</span>
          </a>
          <a href="adminCustomers.html" class="ADMIN-NAV-LINK">
            <i class="fa-solid fa-users"></i>
            <span>Customers</span>
          </a>
          <a href="adminPayments.html" class="ADMIN-NAV-LINK">
            <i class="fa-solid fa-wallet"></i>
            <span>Payments</span>
          </a>
          <a href="adminPromos.html" class="ADMIN-NAV-LINK">
            <i class="fa-solid fa-ticket"></i>
            <span>Promos</span>
          </a>
          <a href="adminRewards.html" class="ADMIN-NAV-LINK">
            <i class="fa-solid fa-gift"></i>
            <span>Rewards</span>
          </a>
        </nav>


        <!-- ===================== LOGOUT ===================== -->
        <div class="ADMIN-SIDEBAR-FOOTER">
          <a href="loginSignUp.html" class="ADMIN-NAV-LINK ADMIN-LOGOUT">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
          </a>
        </div>
      </aside>


      <!-- ====================== MAIN AREA ====================== -->
      <div class="ADMIN-MAIN">
        <!-- ====================== TOP BAR ====================== -->
        <header class="ADMIN-TOPBAR">
          <button type="button" class="ADMIN-MENU-BUTTON" aria-label="Toggle menu">
            <i class="fa-solid fa-bars"></i>
          </button>


          <div class="ADMIN-TOPBAR-ACTIONS">
            <button type="button" class="ADMIN-ICON-BUTTON" aria-label="Notifications">
              <i class="fa-regular fa-bell"></i>
            </button>


            <div class="ADMIN-USER">
              <div class="ADMIN-USER-AVATAR">
                <i class="fa-regular fa-user"></i>
              </div>
              <span>Admin User</span>
              <button type="button" class="ADMIN-DROPDOWN-BUTTON" aria-label="Open admin menu">
                <i class="fa-solid fa-chevron-down"></i>
              </button>
              <div class="ADMIN-USER-DROPDOWN">
                <button type="button">Account</button>
                <a href="loginSignUp.html">Log Out</a>
              </div>
            </div>
          </div>
        </header>


        <!-- ====================== PRODUCTS ====================== -->
        <section class="ADMIN-CONTENT ADMIN-PRODUCTS-CONTENT">
          <div class="ADMIN-INTRO">
            <h2>Products</h2>
          </div>


          <!-- ===================== TOOLBAR ===================== -->
          <div class="ADMIN-PRODUCTS-TOOLS">
            <label class="ADMIN-SEARCH">
              <input id="admin-product-search" type="search" placeholder="Search products...">
              <i class="fa-solid fa-magnifying-glass"></i>
            </label>


            <label class="ADMIN-FILTER">
              <select id="admin-product-category">
                <option>All Categories</option>
              </select>
            </label>


            <button type="button" class="ADMIN-ADD-BUTTON">
              <i class="fa-solid fa-plus"></i>
              <span>Add Product</span>
            </button>
          </div>


          <!-- ===================== PRODUCTS TABLE ===================== -->
          <section class="ADMIN-TABLE-CARD">
            <div class="ADMIN-TABLE-WRAP">
              <table class="ADMIN-TABLE ADMIN-PRODUCTS-TABLE">
                <thead>
                  <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price (16oz / 22oz)</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="admin-products-body"></tbody>
              </table>
            </div>
          </section>


          <!-- ===================== PAGINATION ===================== -->
          <div class="ADMIN-PAGINATION" id="admin-pagination"></div>
        </section>
      </div>
    </section>
  </main>


  <!-- ===================== PRODUCT MODAL ===================== -->
  <div class="ADMIN-MODAL-BACKDROP" id="admin-product-modal" hidden>
    <section class="ADMIN-MODAL" role="dialog" aria-modal="true" aria-labelledby="admin-product-modal-title">
      <div class="ADMIN-MODAL-HEADER">
        <h3 id="admin-product-modal-title">Add Product</h3>
        <button type="button" class="ADMIN-MODAL-CLOSE" id="admin-modal-close" aria-label="Close product form">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>


      <form class="ADMIN-PRODUCT-FORM" id="admin-product-form">
        <div class="ADMIN-FORM-IMAGE-COL">
          <p class="ADMIN-FORM-LABEL">Image</p>


          <label class="ADMIN-IMAGE-UPLOAD" for="admin-product-image-file">
            <div class="ADMIN-IMAGE-PREVIEW" id="admin-image-preview">
              <i class="fa-regular fa-image"></i>
            </div>
            <span>Upload Image</span>
            <small>or</small>
            <strong>Enter Image URL</strong>
          </label>


          <input id="admin-product-image-file" type="file" accept="image/*" hidden>


          <label class="ADMIN-FIELD">
            <span>Image URL (optional)</span>
            <input id="admin-product-image-url" type="text" placeholder="https://example.com/image.png">
          </label>
        </div>


        <div class="ADMIN-FORM-FIELDS">
          <label class="ADMIN-FIELD">
            <span>Product Name</span>
            <input id="admin-product-name" type="text" placeholder="e.g. Matcha" required>
          </label>


          <label class="ADMIN-FIELD">
            <span>Category</span>
            <select id="admin-product-form-category" required></select>
          </label>


          <div class="ADMIN-PRICE-GRID">
            <label class="ADMIN-FIELD">
              <span>16oz (PHP)</span>
              <input id="admin-product-price-16" type="number" min="0" step="1" placeholder="90">
            </label>


            <label class="ADMIN-FIELD">
              <span>22oz (PHP)</span>
              <input id="admin-product-price-22" type="number" min="0" step="1" placeholder="110">
            </label>
          </div>


          <label class="ADMIN-FIELD">
            <span>Description</span>
            <textarea id="admin-product-description" rows="4" placeholder="Enter product description..."></textarea>
          </label>
        </div>


        <div class="ADMIN-MODAL-ACTIONS">
          <button type="button" class="ADMIN-MODAL-SECONDARY" id="admin-modal-cancel">Cancel</button>
          <button type="submit" class="ADMIN-MODAL-PRIMARY" id="admin-modal-submit">Save Product</button>
        </div>
      </form>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
