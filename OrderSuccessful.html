    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="..." crossorigin="anonymous">
</head>
<body class="order-success-page">
    <main class="ORDER-SUCCESS-WRAP">
        <section class="ORDER-SUCCESS-CARD">
            <div class="ORDER-SUCCESS-ICON">
                <i class="fa-solid fa-check"></i>
            </div>

            <h1>Order Successful!</h1>
            <p class="ORDER-SUCCESS-MESSAGE">Thank you! Your order has been placed.</p>

            <div class="ORDER-SUCCESS-SUMMARY">
                <div class="ORDER-SUCCESS-SUMMARY-BLOCK">
                    <span class="ORDER-SUCCESS-LABEL">Order ID</span>
                    <strong id="order-id-display">#---</strong>
                </div>
            </div>

            <a href="customerAccountOrders.php" class="VIEW-MY-ORDER-BUTTON">VIEW MY ORDER</a>

            <div class="ORDER-SUCCESS-DIVIDER"></div>

            <section class="ORDER-SUCCESS-NEXT">
                <h2>What would you like to do next?</h2>

                <div class="ORDER-SUCCESS-ACTIONS">
                    <a href="customerMenu.php" class="ORDER-SUCCESS-ACTION-CARD">
                        <div class="ORDER-SUCCESS-ACTION-ICON">
                            <i class="fa-solid fa-rotate-right"></i>
                        </div>
                        <h3>Order Again</h3>
                    </a>

                    <a href="customerHomePage.html" class="ORDER-SUCCESS-ACTION-CARD">
                        <div class="ORDER-SUCCESS-ACTION-ICON">
                            <i class="fa-solid fa-house"></i>
                        </div>
                        <h3>Back to Home</h3>
                    </a>
                </div>
            </section>
        </section>
    </main>
    <script>
      (function initOrderSuccessPage() {
        const orderIdEl = document.getElementById('order-id-display');
        if (!orderIdEl) return;

        const params   = new URLSearchParams(window.location.search);
        const rawId    = parseInt(params.get('order_id') || params.get('orderId') || 0, 10);

        if (rawId > 0) {
            // Pad to minimum 3 digits: #ORD-001, #ORD-012, #ORD-123, #ORD-1234
            const padded = String(rawId).padStart(4, '0');
            orderIdEl.textContent = '#ORD-' + padded;
        } else {
            orderIdEl.textContent = '#ORD-000';
        }
      })();
    </script>
</body>
</html>
